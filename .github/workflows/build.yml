name: Build APK

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx2g"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml') }}
          restore-keys: gradle-

      - name: Download Gradle wrapper JAR
        run: |
          mkdir -p gradle/wrapper
          curl -fL \
            "https://raw.githubusercontent.com/gradle/gradle/v8.6.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar
          echo "JAR: $(ls -lh gradle/wrapper/gradle-wrapper.jar)"

      - name: Grant Gradle permissions
        run: chmod +x gradlew

      - name: Generate debug keystore
        run: |
          mkdir -p keystore
          keytool -genkey -v \
            -keystore keystore/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: WebViewer-APK
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: APK info
        run: ls -lh app/build/outputs/apk/release/ || echo "No APK found"
